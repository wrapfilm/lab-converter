<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>色彩空间双向转换器</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; min-height: 100vh; display: flex; align-items: center; font-family: system-ui; }
        .card { border-radius: 15px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .nav-pills .nav-link.active { background-color: #0d6efd; }
        .preview-box { height: 100px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; transition: 0.3s; border: 1px solid #eee; }
        .result-card { background: #fff; border-left: 5px solid #0d6efd; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-8">
            <div class="card p-4">
                <h3 class="text-center mb-4">色彩空间转换器</h3>

                <ul class="nav nav-pills nav-fill mb-4" id="modeTab" role="tablist">
                    <li class="nav-item">
                        <button class="nav-link active" id="lab2rgb-tab" data-bs-toggle="pill" data-bs-target="#lab2rgb" type="button">Lab → RGB</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" id="rgb2lab-tab" data-bs-toggle="pill" data-bs-target="#rgb2lab" type="button">RGB → Lab</button>
                    </li>
                </ul>

                <div class="tab-content">
                    <div class="tab-pane fade show active" id="lab2rgb">
                        <div class="row g-2">
                            <div class="col-4"><label class="small fw-bold">L*</label><input type="number" id="l" class="form-control" value="50"></div>
                            <div class="col-4"><label class="small fw-bold">a*</label><input type="number" id="a" class="form-control" value="20"></div>
                            <div class="col-4"><label class="small fw-bold">b*</label><input type="number" id="b" class="form-control" value="10"></div>
                        </div>
                    </div>

                    <div class="tab-pane fade" id="rgb2lab">
                        <div class="row g-2">
                            <div class="col-4"><label class="small fw-bold">R</label><input type="number" id="r" class="form-control" value="255" max="255"></div>
                            <div class="col-4"><label class="small fw-bold">G</label><input type="number" id="g" class="form-control" value="100" max="255"></div>
                            <div class="col-4"><label class="small fw-bold">B</label><input type="number" id="b_in" class="form-control" value="50" max="255"></div>
                        </div>
                    </div>
                </div>

                <button class="btn btn-primary w-100 mt-4 py-2 fw-bold" onclick="handleConvert()">开始转换</button>

                <div id="res-section" class="mt-4" style="display:none;">
                    <div id="preview" class="preview-box mb-3 text-white shadow-sm">颜色预览</div>
                    <div class="result-card p-3 shadow-sm">
                        <span class="text-muted small d-block" id="res-label">结果值:</span>
                        <strong class="fs-5" id="res-value"></strong>
                    </div>
                </div>
            </div>
        </div>
        <p class="text-center mt-3 text-muted small">© 3M All Rights Reserved. {{ current_year }} 色彩计算工具</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    async function handleConvert() {
        const isActiveTab = document.querySelector('#lab2rgb-tab').classList.contains('active');
        const mode = isActiveTab ? 'lab2rgb' : 'rgb2lab';

        let payload = { mode: mode };
        if (mode === 'lab2rgb') {
            payload.l = document.getElementById('l').value;
            payload.a = document.getElementById('a').value;
            payload.b = document.getElementById('b').value;
        } else {
            payload.r = document.getElementById('r').value;
            payload.g = document.getElementById('g').value;
            payload.b = document.getElementById('b_in').value;
        }

        const resp = await fetch('/convert', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const data = await resp.json();
        if (data.success) {
            document.getElementById('res-section').style.display = 'block';
            const valBox = document.getElementById('res-value');
            const preview = document.getElementById('preview');

            if (data.type === 'rgb') {
                const [r, g, b] = data.result;
                valBox.innerText = `R:${r} G:${g} B:${b}`;
                preview.style.backgroundColor = `rgb(${r},${g},${b})`;
                document.getElementById('res-label').innerText = "Adobe RGB 结果:";
            } else {
                const [l, a, b] = data.result;
                valBox.innerText = `L:${l} a:${a} b:${b}`;
                // RGB预览需要用输入的值
                const r_in = document.getElementById('r').value;
                const g_in = document.getElementById('g').value;
                const b_in = document.getElementById('b_in').value;
                preview.style.backgroundColor = `rgb(${r_in},${g_in},${b_in})`;
                document.getElementById('res-label').innerText = "CIE Lab 结果:";
            }
        }
    }
</script>
</body>
</html>
